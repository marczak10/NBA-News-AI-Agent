databases:
  - name: nba-news-ai-agent-db
    plan: basic-256mb
    ipAllowList: []

services:
  - type: cron
    name: nba-news-ai-agent-cron
    runtime: python
    plan: starter
    # Render cron schedules use UTC.
    # 08:00 UTC = 10:00 in Poland during daylight saving time (CEST).
    # In standard time (CET), 10:00 Poland time would be 09:00 UTC.
    schedule: "0 8 * * *"
    buildCommand: "pip install --upgrade pip && pip install -r requirements.txt"
    startCommand: "python -u -m app.services.main"
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.5
      - key: LOG_LEVEL
        value: INFO
      - key: LOG_FILE_PATH
        value: /tmp/nba_news_agent.log
      - key: OPENAI_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: nba-news-ai-agent-db
          property: connectionString
      - key: MY_EMAIL
        sync: false
      - key: APP_PASSWORD
        sync: false
